# ============================================================================
# Flakewatch + GitHub Actions Integration
# ============================================================================
# This workflow runs your tests and sends the results to Flakewatch
# so it can automatically detect flaky tests.
#
# HOW TO USE:
# 1. Copy this file to your project: .github/workflows/test-with-flakewatch.yml
# 2. Add these secrets to your repo (Settings → Secrets → Actions):
#    - FLAKEWATCH_URL: http://your-flakewatch-server:8080
#    - FLAKEWATCH_API_KEY: your_api_key_here
# 3. Push code — this workflow runs automatically!
# ============================================================================

name: Test & Report to Flakewatch

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      # ---- Step 1: Check out your code ----
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---- Step 2: Set up your language/runtime ----
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ---- Step 3: Run your tests ----
      - name: Run Tests
        id: tests
        run: |
          mvn test -B 2>&1 | tee test-output.log
          echo "test_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true   # Don't stop the workflow if tests fail

      # ---- Step 4: Parse test results and send to Flakewatch ----
      # This step runs ALWAYS (even if tests fail — that's the whole point!)
      - name: Report Results to Flakewatch
        if: always()
        env:
          FLAKEWATCH_URL: ${{ secrets.FLAKEWATCH_URL }}
          FLAKEWATCH_API_KEY: ${{ secrets.FLAKEWATCH_API_KEY }}
        run: |
          # Parse the Maven test output to extract test results
          # In a real project, you'd parse the JUnit XML reports from target/surefire-reports/
          
          # For now, we build the payload manually with your actual test names
          PAYLOAD=$(cat <<EOF
          {
            "eventId": "${{ github.run_id }}-${{ github.run_attempt }}",
            "commitHash": "${{ github.sha }}",
            "branchName": "${{ github.ref_name }}",
            "runnerId": "github-actions-${{ github.run_id }}",
            "results": [
              {
                "testIdentifier": "com.example.UserServiceTest.testLogin",
                "suiteName": "UserServiceTest",
                "status": "${{ steps.tests.outcome == 'success' && 'PASS' || 'FAIL' }}",
                "durationMs": 1200
              },
              {
                "testIdentifier": "com.example.UserServiceTest.testSignup",
                "suiteName": "UserServiceTest",
                "status": "${{ steps.tests.outcome == 'success' && 'PASS' || 'FAIL' }}",
                "durationMs": 800
              },
              {
                "testIdentifier": "com.example.PaymentTest.testCheckout",
                "suiteName": "PaymentTest",
                "status": "${{ steps.tests.outcome == 'success' && 'PASS' || 'FAIL' }}",
                "durationMs": 2500
              }
            ]
          }
          EOF
          )

          echo "📡 Sending test results to Flakewatch..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${FLAKEWATCH_URL}/api/v1/ingest/test-results" \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: ${FLAKEWATCH_API_KEY}" \
            -d "${PAYLOAD}")
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Results sent to Flakewatch successfully!"
          else
            echo "⚠️ Flakewatch returned HTTP $RESPONSE (non-blocking)"
          fi

      # ---- Step 5: Fail the build if tests actually failed ----
      - name: Check Test Results
        if: steps.tests.outcome == 'failure'
        run: |
          echo "❌ Tests failed. Check the test output above."
          exit 1
